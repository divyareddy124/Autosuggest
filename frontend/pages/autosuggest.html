<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeingInfinity</title>
    <link rel="stylesheet" href="autosuggest.css">
</head>
<body>

<div class="container">

    <div class="card">

   
    <div class="top-icons">
        <span class="gear">&#9881;</span>
        <div class="status-group">
            <span>&bull;</span>
            <span>online</span>
            <span>|</span>
            <span>&#128339;</span>
            <span>- ms</span>
        </div>
    </div>


    <h1><span class="purple">Being</span>Infinity</h1>

    <p class="subtitle">
        One million phrases. Four algorithms. Prefix Based Auto Suggest.
    </p>

    <div class="search-box">
        <span class="search-icon">&#128269;</span>
        <input type="text" placeholder="Start typing to search phrase">
    </div>

    <div class="suggestion-box">
        <div class="suggestion-item">Suggestion box</div>
    
    </div>

</div>

</body>
</html>
